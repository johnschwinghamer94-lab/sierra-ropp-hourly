name: Bonus sheet backfill (daily · trailing 15 days)
on:
  schedule:
    - cron: "0 4 * * *"    # 04:00 UTC = 9 PM PT — after the day's TGLs have run/sold
  workflow_dispatch:
concurrency:
  group: bonus-backfill
  cancel-in-progress: false
jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: America/Los_Angeles
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Backfill ran/sold on the DAILY LTO sheet (trailing 15 days)
        env:
          ST_CREDS_JSON: ${{ secrets.ST_CREDS_JSON }}
          SHEET_WEBHOOK: ${{ secrets.SHEET_WEBHOOK }}
        run: python bonus_backfill.py
