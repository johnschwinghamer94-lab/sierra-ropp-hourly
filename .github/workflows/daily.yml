name: Cloud rebuild (hourly · live API)
on:
  schedule:
    - cron: "20 8-15 * * *"   # overnight backup; daytime runs dispatched hourly
  workflow_dispatch:
permissions:
  contents: write            # allow the refresher to commit cancel_dup_exclusions.json back
jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4          # engine (this private repo)
      - uses: actions/checkout@v4          # live site (public repo)
        with:
          repository: johnschwinghamer94-lab/sierra-ropp-dashboard
          token: ${{ secrets.DASHBOARD_TOKEN }}
          path: site
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install --quiet -r requirements.txt
      - name: Fetch reports — ServiceTitan API (fallback to OneDrive Excel)
        env:
          ST_CREDS_JSON: ${{ secrets.ST_CREDS_JSON }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_REFRESH_TOKEN: ${{ secrets.GRAPH_REFRESH_TOKEN }}
          DASHBOARD_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
        run: |
          if python cloud_fetch.py; then
            echo "ROPP_SOURCE=api" >> "$GITHUB_ENV"
            echo "OK — fetched ROPP reports from the ServiceTitan Reporting API"
          else
            echo "WARN — ServiceTitan fetch unavailable; falling back to OneDrive Excel"
            python graph_download_cloud.py
          fi
      - name: Refresh duplicate-ticket exclusions (once daily · 14:00 UTC)
        continue-on-error: true          # a refresher failure keeps the last good list; never breaks the build
        env:
          ST_CREDS_JSON: ${{ secrets.ST_CREDS_JSON }}
        run: |
          # The true-dup scan makes ~200 API calls, so run it once a day (after cloud_fetch
          # materialized creds) — plus on any manual run. Other hourly builds reuse the
          # committed cancel_dup_exclusions.json.
          if [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ] && [ "$(date -u +%H)" != "14" ]; then
            echo "hourly rebuild — dup-exclusion refresh runs at 14:00 UTC only; skipping"
            exit 0
          fi
          python cloud_fetch.py >/dev/null 2>&1 || true   # ensure ~/.servicetitan creds exist
          if python refresh_dup_exclusions.py; then
            git config user.email "johnschwinghamer94@gmail.com"
            git config user.name "John Schwinghamer"
            git add cancel_dup_exclusions.json
            git commit -m "Refresh cancel duplicate-exclusions ($(date -u +%F))" || echo "no change"
            git push || echo "push skipped"
          fi
      - name: Rebuild index.html and push
        env:
          ROPP_REPO: ${{ github.workspace }}/site
        run: |
          git -C site config user.email "johnschwinghamer94@gmail.com"
          git -C site config user.name "John Schwinghamer"
          python auto_update_dashboard.py
      - name: Audit — published dashboard vs your emailed reports (freshness-tolerant)
        continue-on-error: true          # a DRIFT flags the step red but never reverts the build
        env:
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_REFRESH_TOKEN: ${{ secrets.GRAPH_REFRESH_TOKEN }}
          DASHBOARD_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
          AUDIT_FRESH: "6"               # per-tech count allowance; 5%/$50k on money
        run: |
          # Your emailed reports refresh ~daily, so audit vs them once a day (14:00 UTC ≈ 7 AM
          # Pacific, after the morning reports land) — plus on any manual run. Other hourly
          # rebuilds skip this to avoid hammering the Graph API.
          if [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ] && [ "$(date -u +%H)" != "14" ]; then
            echo "hourly rebuild — daily report audit runs at 14:00 UTC only; skipping this hour"
            exit 0
          fi
          # Recount from YOUR emailed Excel reports and diff against the published (API-fed) index.html.
          python graph_download_cloud.py || echo "(could not fetch emailed reports for audit)"
          python audit_dashboard.py --index site/index.html
