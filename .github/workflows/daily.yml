name: Cloud daily rebuild
on:
  schedule:
    - cron: "20 14 * * *"   # ~7:20 AM Pacific
  workflow_dispatch:
jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4          # engine (this private repo)
      - uses: actions/checkout@v4          # live site (public repo)
        with:
          repository: johnschwinghamer94-lab/sierra-ropp-dashboard
          token: ${{ secrets.DASHBOARD_TOKEN }}
          path: site
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install --quiet requests openpyxl pynacl
      - name: Fetch reports — ServiceTitan API (fallback to OneDrive Excel)
        env:
          ST_CREDS_JSON: ${{ secrets.ST_CREDS_JSON }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_REFRESH_TOKEN: ${{ secrets.GRAPH_REFRESH_TOKEN }}
          DASHBOARD_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
        run: |
          if python cloud_fetch.py; then
            echo "ROPP_SOURCE=api" >> "$GITHUB_ENV"
            echo "OK — fetched ROPP reports from the ServiceTitan Reporting API"
          else
            echo "WARN — ServiceTitan fetch unavailable; falling back to OneDrive Excel"
            python graph_download_cloud.py
          fi
      - name: Rebuild index.html and push
        env:
          ROPP_REPO: ${{ github.workspace }}/site
        run: |
          git -C site config user.email "johnschwinghamer94@gmail.com"
          git -C site config user.name "John Schwinghamer"
          python auto_update_dashboard.py
      - name: Data self-audit (independent recount vs published index.html)
        continue-on-error: true
        run: python audit_dashboard.py --index site/index.html
