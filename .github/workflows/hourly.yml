name: Hourly capture
on:
  push:
    paths: ["hourly_reports/**"]
  workflow_dispatch:
jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install --quiet openpyxl requests
      - env: { DASHBOARD_TOKEN: "${{ secrets.DASHBOARD_TOKEN }}" }
        run: python cloud_hourly.py
