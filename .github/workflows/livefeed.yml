name: SILO Live Feed (cloud)
on:
  schedule:
    # PT = UTC-7. Dense 6:50-9a start window (GitHub skips single ticks),
    # then re-arm every 2 h through 9 pm. concurrency keeps one active
    # session + one queued, so extra ticks collapse harmlessly.
    - cron: "50,55 13 * * *"
    - cron: "0,15,30,45 14,15 * * *"
    - cron: "0 16,18,20,22,0,2,4 * * *"
  workflow_dispatch:
concurrency:
  group: livefeed
  cancel-in-progress: false
jobs:
  livefeed:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      TZ: America/Los_Angeles
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - env:
          ST_CREDS_JSON: ${{ secrets.ST_CREDS_JSON }}
          DASHBOARD_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
          SHEET_WEBHOOK: ${{ secrets.SHEET_WEBHOOK }}
          LIVEFEED_CLOUD: "1"
        run: python livefeed_sync.py
